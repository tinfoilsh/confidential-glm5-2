cvm-version: 0.10.4
cpus: 32
memory: 1048576
gpus: 8

models:
  - name: "glm-5-2"
    repo: "zai-org/GLM-5.2@4d67f66cc64d3219133b767c253b2ad1425c6c88"
    mpk: "e747631764219bc44fd8d270df04b8e910f090e94f3303ff1a63e2f2cffe4d6e_1506693414912_f513b1c7-244f-563a-a07e-eb9de423e558"

containers:
  - name: "glm-5-2"
    image: "vllm/vllm-openai:glm52-cu129@sha256:7104a8417c50e236342ba5a16db7fc0befe5b7a86d7d425bff0453431b2d015d"
    runtime: nvidia
    gpus: all
    restart: always
    env:
      - PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      - VLLM_DEEP_GEMM_WARMUP: "skip"
    command: ["--model", "/tinfoil/mpk/mpk-e747631764219bc44fd8d270df04b8e910f090e94f3303ff1a63e2f2cffe4d6e", "--tensor-parallel-size",
      "8", "--disable-custom-all-reduce", "--kv-cache-dtype", "fp8_e4m3", "--cpu-offload-gb", "64", "--gpu-memory-utilization",
      "0.95", "--max-model-len", "131072", "--max-num-seqs", "1", "--speculative-config.method", "mtp",
      "--speculative-config.num_speculative_tokens", "5", "--tool-call-parser", "glm47", "--reasoning-parser", "glm45",
      "--enable-auto-tool-choice", "--chat-template-content-format=string", "--served-model-name", "glm-5-2", "--scheduling-policy",
      "priority", "--port", "8001"]
    tmpfs:
      /tmp: size=512m,mode=1777,exec
      /root: size=2g,mode=0700,exec
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 120m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
    - /health

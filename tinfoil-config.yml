cvm-version: 0.10.4
cpus: 32
memory: 524288
gpus: 8

models:
  - name: "glm-5-2"
    repo: "zai-org/GLM-5.2-FP8@a0b55e88465d1a06afece97bc8d6b366aff39089"
    mpk: "98d8b697173111b91b32a4daafc179bb5d8c5dbcd8fb8732f1f73ffcbc7a9b9f_755663769600_4e76874a-36d8-54fd-a07e-6fc22dd54b6b"

containers:
  - name: "glm-5-2"
    image: "vllm/vllm-openai:v0.23.0-ubuntu2404@sha256:662e4975c5c9947f8723f4d8f438145971361a480a2ade1919bb9462a9f24088"
    runtime: nvidia
    gpus: all
    restart: always
    env:
      - PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    command: ["--model", "/tinfoil/mpk/mpk-98d8b697173111b91b32a4daafc179bb5d8c5dbcd8fb8732f1f73ffcbc7a9b9f", "--kv-cache-dtype",
      "fp8_e4m3", "--tensor-parallel-size", "8", "--tool-call-parser", "glm47", "--enable-auto-tool-choice",
      "--reasoning-parser", "glm45", "--served-model-name", "glm-5-2", "--scheduling-policy", "priority", "--port", "8001"]
    tmpfs:
      /tmp: size=512m,mode=1777,exec
      /root: size=2g,mode=0700,exec
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 120m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
    - /health

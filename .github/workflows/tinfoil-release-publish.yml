# DO NOT RUN MANUALLY. This workflow is dispatched automatically by
# `tinfoil-release.yml` against the newly created release tag.

name: Tinfoil Release - Publish (auto-triggered)

run-name: Publish release ${{ github.ref_name }}

on:
  workflow_dispatch:

concurrency:
  group: tinfoil-container-release-${{ github.ref_name }}

jobs:
  measure-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub release
      packages: write       # attach the attestation to the image
      id-token: write       # keyless attestation signing
      attestations: write   # publish the attestation

    steps:
      - name: Precondition checks
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" != "tag" ]; then
            echo "::error::publish workflow must run on a release tag, but this run is on $REF_TYPE '$REF_NAME'."
            exit 1
          fi

          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            echo "::error::Release $REF_NAME already exists; refusing to re-publish."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

      - name: Build and publish container image
        shell: bash
        id: image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --network host \
            --provenance=false \
            --tag "$IMAGE:$TAG" \
            --push \
            .

          DIGEST="$(docker buildx imagetools inspect "$IMAGE:$TAG" --format '{{.Manifest.Digest}}')"
          IMAGE_REF="$IMAGE@$DIGEST"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Published $IMAGE_REF"

      - name: Render measured Tinfoil config
        shell: bash
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          mkdir -p output
          chmod 0777 output
          cp tinfoil-config.yml output/tinfoil-config.measured.yml
          perl -0pi -e 's#image:\s*"ghcr\.io/tinfoilsh/confidential-glm5-2[^"]*"#image: "$ENV{IMAGE_REF}"#g' output/tinfoil-config.measured.yml
          grep -F "$IMAGE_REF" output/tinfoil-config.measured.yml

      - name: Ensure gh CLI supports attestation
        shell: bash
        run: |
          GH_VERSION=$(gh --version | head -1 | awk '{print $3}')
          MIN_VERSION="2.67.0"
          echo "gh version: $GH_VERSION (minimum: $MIN_VERSION)"

          if [ "$(printf '%s\n' "$MIN_VERSION" "$GH_VERSION" | sort -V | head -1)" != "$MIN_VERSION" ]; then
            echo "ERROR: gh CLI version $GH_VERSION is too old. Need >= $MIN_VERSION for attestation support."
            exit 1
          fi

      - name: Create deployment manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --read-only \
            --tmpfs /tmp \
            --tmpfs /cache \
            --tmpfs /root/.cache \
            -v "$(pwd)/output":/output \
            -v "$(pwd)/output/tinfoil-config.measured.yml":/config.yml:ro \
            -e GH_TOKEN="$GH_TOKEN" \
          ghcr.io/tinfoilsh/measure-image-action@sha256:4c909b912389eeb0a2f47818a58a6d5c6a5847d7017349604133b15596aba1fc

      - name: Fix output permissions
        shell: bash
        run: sudo chown -R "$(id -u):$(id -g)" output

      - name: Hash deployment manifest
        shell: bash
        id: hash
        run: |
          echo stdout=sha256:$(sha256sum output/tinfoil-deployment.json | cut -d ' ' -f 1 | tee output/tinfoil.hash) >> "$GITHUB_OUTPUT"

      - name: Attest
        uses: actions/attest@7667f588f2f73a90cea6c7ac70e78266c4f76616 # v3.1.0
        id: attest
        with:
          subject-name: tinfoil-deployment.json
          subject-digest: ${{ steps.hash.outputs.stdout }}
          predicate-type: https://tinfoil.sh/predicate/snp-tdx-multiplatform/v1
          predicate-path: output/tinfoil-deployment.json

      - name: Generate release notes
        shell: bash
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          cat output/release.md > output/release-notes.md
          echo "" >> output/release-notes.md
          echo "Container Image: \`$IMAGE_REF\`" >> output/release-notes.md
          echo "Digest: \`$(cat output/tinfoil.hash)\`" >> output/release-notes.md
          echo "Sigstore Link: https://search.sigstore.dev/?hash=$(cat output/tinfoil.hash)" >> output/release-notes.md

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$RELEASE_REF" \
            --verify-tag \
            -R "$REPO" \
            --title "$RELEASE_REF" \
            --notes-file output/release-notes.md \
            --latest=false \
            output/tinfoil-deployment.json \
            output/tinfoil.hash
